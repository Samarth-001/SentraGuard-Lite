email_regex: >-
  \b[A-Za-z0-9](?:[A-Za-z0-9._%+-]{0,62}[A-Za-z0-9])?
  @[A-Za-z0-9](?:[A-Za-z0-9-]{0,62}[A-Za-z0-9])?
  (?:\.[A-Za-z0-9](?:[A-Za-z0-9-]{0,62}[A-Za-z0-9])?)+\b

phone:
  enabled: true
  default_region: US
  allow_international: true
  validate_country_code: true
  detect_extensions: true
  max_scan_chars: 50000

ner:
  enabled: true
  language: en
  min_confidence: 0.40
  max_scan_chars: 50000

  merge_overlapping: true
  merge_adjacent: true

  entity_map:
    PERSON: person
    LOCATION: location
    ORGANIZATION: organization

    EMAIL_ADDRESS: email
    PHONE_NUMBER: phone

    CREDIT_CARD: credit_card
    IBAN_CODE: iban
    US_BANK_NUMBER: bank_account
    ROUTING_NUMBER: routing_number
    SWIFT_CODE: swift_code

    US_SSN: ssn
    PASSPORT: passport
    US_PASSPORT: passport
    US_DRIVER_LICENSE: drivers_license

    TAX_ID: tax_id
    EIN: ein

    IP_ADDRESS: ip_address
    IPV4: ipv4
    IPV6: ipv6

    URL: url
    DOMAIN_NAME: domain

    CRYPTO: crypto_wallet

    DATE_TIME: date
    AGE: age

    MEDICAL_LICENSE: medical_license
    MEDICAL_RECORD: medical_record
    HEALTH_INSURANCE: insurance_id

    VEHICLE_IDENTIFICATION_NUMBER: vin
    LICENSE_PLATE: license_plate

    USERNAME: username

regex_detectors:

  mac_address:
    enabled: true

  ipv6:
    enabled: true

  jwt_token:
    enabled: true

  aws_access_key:
    enabled: true

  github_token:
    enabled: true

  google_api_key:
    enabled: true

  slack_token:
    enabled: true

  bearer_token:
    enabled: true

  private_key:
    enabled: true

  ssh_key:
    enabled: true

  passport:
    enabled: true

  iban:
    enabled: true

  swift:
    enabled: true

  routing_number:
    enabled: true

  vin:
    enabled: true

  license_plate:
    enabled: false

